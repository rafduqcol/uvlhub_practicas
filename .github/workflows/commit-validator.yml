name: Validate Commit Messages

on:
  push:
    branches:
      - main

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Commit Messages
        run: |
          # Obtener todos los commits del push actual
          git log --oneline HEAD..FETCH_HEAD | while read -r commit; do
            # Extraer solo el mensaje de commit
            message=$(echo "$commit" | sed 's/^[a-f0-9]* //')
            
            # Validar el formato del mensaje
            if [[ ! "$message" =~ ^(feat:|fix:|doc:)[[:space:]][A-Z] ]]; then
              echo "❌ Invalid commit message: $message"
              echo "Expected format: feat/fix/doc: \"Message\", where Message starts with an uppercase letter."
              exit 1
            fi
          done
